name: Daily Indexation Check

on:
  schedule:
    # 09:00 UTC = 12:00 Israel daily
    - cron: '0 9 * * *'
  workflow_dispatch:  # allow manual trigger

permissions:
  contents: read

jobs:
  check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install googleapis@latest --no-save

      - name: Run indexation status check
        run: node scripts/check-indexation-status.cjs
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SUPABASE_URL: https://rtlpqjqdmomyptcdkmrq.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_EMAIL: yosi5919@gmail.com
