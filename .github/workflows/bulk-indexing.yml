name: Bulk Indexing Push (Manual)

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  push:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install deps
        run: npm install googleapis@latest --no-save

      - name: Bulk-request indexing for all articles
        run: node scripts/bulk-request-indexing.cjs
        env:
          GOOGLE_SERVICE_ACCOUNT_KEY: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_KEY }}
          SUPABASE_URL: https://rtlpqjqdmomyptcdkmrq.supabase.co
          SUPABASE_SERVICE_KEY: ${{ secrets.SUPABASE_SERVICE_KEY }}
          ALERT_EMAIL: yosi5919@gmail.com
