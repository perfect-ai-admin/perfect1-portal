name: Build, Prerender & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for prerender
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build app
        run: npm run build:no-prerender

      - name: Prerender portal pages
        run: node scripts/prerender.js
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output
          mv dist .vercel/output/static
          cat > .vercel/output/config.json << 'EOF'
          {
            "version": 3,
            "routes": [
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html" }
            ]
          }
          EOF

      - name: Deploy to Vercel
        run: vercel deploy --prod --prebuilt --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
