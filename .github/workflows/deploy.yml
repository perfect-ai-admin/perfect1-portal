name: Build, Prerender & Deploy

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  build-and-deploy:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: 'npm'

      - name: Validate vercel.json
        run: node -e "JSON.parse(require('fs').readFileSync('vercel.json','utf8')); console.log('vercel.json is valid')"

      - name: Install dependencies
        run: npm ci

      - name: Install Chrome for prerender
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Build app
        run: npm run build:no-prerender

      - name: Prerender portal pages
        run: node scripts/prerender.js
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      # Smoke test — fails the build if any critical route renders a white screen,
      # hits the GeneralErrorBoundary fallback, or hangs in an auth spinner.
      # This is the last line of defense before the bits reach production.
      - name: Smoke test critical routes
        run: node scripts/smoke-test-routes.js
        env:
          CHROME_PATH: /usr/bin/google-chrome-stable

      - name: Install Vercel CLI
        run: npm install -g vercel@latest

      - name: Prepare Vercel output
        run: |
          mkdir -p .vercel/output
          mv dist .vercel/output/static
          cat > .vercel/output/config.json << 'VERCEL_CONFIG'
          {
            "version": 3,
            "routes": [
              {
                "src": "/(.*)",
                "headers": {
                  "X-Content-Type-Options": "nosniff",
                  "X-Frame-Options": "DENY",
                  "X-XSS-Protection": "1; mode=block",
                  "Strict-Transport-Security": "max-age=31536000; includeSubDomains; preload",
                  "Content-Security-Policy": "default-src 'self'; script-src 'self' 'unsafe-inline' 'unsafe-eval' https://cdn.jsdelivr.net https://fonts.googleapis.com https://www.googletagmanager.com https://googleads.g.doubleclick.net https://www.googleadservices.com https://pagead2.googlesyndication.com https://www.google-analytics.com https://connect.facebook.net https://www.google.com https://td.doubleclick.net; style-src 'self' 'unsafe-inline' https://fonts.googleapis.com https://www.googletagmanager.com; font-src 'self' https://fonts.gstatic.com; img-src 'self' data: https: https://www.googleadservices.com https://googleads.g.doubleclick.net https://www.google.com https://pagead2.googlesyndication.com; connect-src 'self' https:; frame-src https://www.googletagmanager.com https://td.doubleclick.net https://www.facebook.com https://bid.g.doubleclick.net https://direct.tranzila.com https://api.tranzila.com; frame-ancestors 'none'"
                },
                "continue": true
              },
              { "handle": "filesystem" },
              { "src": "/(.*)", "dest": "/index.html", "status": 200, "headers": { "Content-Type": "text/html; charset=utf-8" } }
            ]
          }
          VERCEL_CONFIG

      - name: Deploy to Vercel
        run: vercel deploy --prod --prebuilt=true --token=${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_ORG_ID: ${{ secrets.VERCEL_ORG_ID }}
          VERCEL_PROJECT_ID: ${{ secrets.VERCEL_PROJECT_ID }}
